<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <title>Exercici 1</title>
</head>
<body>

    <h2>Mostra una paraula 10 vegades</h2>

    <input type="text" id="paraula" placeholder="Escriu una paraula">
    <button onclick="mostrarParaula()">Mostrar</button>

    <p id="resultat"></p>

    <script>
        function mostrarParaula() {
            let paraula = document.getElementById("paraula").value;
            let resultat = "";

            for (let i = 0; i < 10; i++) {
                resultat += paraula + "<br>";
            }

            document.getElementById("resultat").innerHTML = resultat;
        }
    </script>

</body>
</html>
