<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Lista con Marcadores Cuadrados</title>
    <style>
        /* Aplica marcadores cuadrados a la lista */
        ul {
            list-style-type: square;
            padding-left: 20px; /* opcional, para separar los marcadores del texto */
            font-family: Arial, sans-serif;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <h2>Actividad 1 - Listas</h2>
    <ul>
        <li>lorem</li>
        <li>adipisci</li>
        <li>libero</li>
    </ul>
</body>
</html>
