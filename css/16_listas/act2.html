<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Lista de Mascotas</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f0f8ff; /* color de fondo suave */
            padding: 30px;
        }

        h2 {
            color: #333;
            margin-bottom: 20px;
        }

        /* Lista con marcadores cuadrados estilizados */
        ul {
            list-style-type: square; /* marcadores cuadrados */
            padding-left: 30px;      /* separación entre marcador y texto */
        }

        /* Color y estilo de los marcadores */
        ul li::marker {
            color: #ff4500; /* naranja brillante */
            font-size: 1.2em;
        }

        ul li {
            margin-bottom: 10px; /* espacio entre los ítems */
        }
    </style>
</head>
<body>
    <h2>Mis Mascotas</h2>
    <ul>
        <li>canela</li>
        <li>chispa</li>
        <li>brisa</li>
    </ul>
</body>
</html>
