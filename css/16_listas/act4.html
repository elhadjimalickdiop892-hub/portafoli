<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Lista de Bat</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1a1a1a; /* fondo oscuro tipo Batman */
            color: #f0f0f0;
            padding: 30px;
        }

        h2 {
            color: #ffcc00; /* amarillo Batman */
            margin-bottom: 20px;
        }

        /* Lista con marcadores cuadrados personalizados */
        ul {
            list-style-type: square; /* marcadores cuadrados */
            padding-left: 30px;
        }

        /* Estilo de los marcadores */
        ul li::marker {
            color: #ffcc00; /* amarillo */
            font-size: 1.2em;
        }

        ul li {
            margin-bottom: 10px;
            padding: 5px 10px;
            background-color: #333; /* fondo oscuro de cada ítem */
            border-radius: 5px;
            transition: background-color 0.3s;
        }

        /* Efecto hover */
        ul li:hover {
            background-color: #555;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h2>Act 4 - Lista Bat</h2>
    <ul>
        <li>bat-coche</li>
        <li>bat-traje</li>
        <li>bat-cueva</li>
    </ul>
</body>
</html>
